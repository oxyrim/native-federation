<div class="layout" [class.collapsed]="collapsed()">
  <!-- ======================= SIDEBAR ======================= -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-logo">U</span>
      @if (!collapsed()) {
        <span class="brand-name">Unified Platform</span>
      }
    </div>

    <nav class="nav">
      @for (section of sections(); track section.label) {
        @if (!collapsed()) {
          <div class="nav-section">{{ section.label }}</div>
        }
        @for (item of section.items; track item.link) {
          <a
            class="nav-item"
            [routerLink]="item.link"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            [title]="item.label"
          >
            <i [class]="item.icon"></i>
            @if (!collapsed()) {
              <span>{{ item.label }}</span>
            }
          </a>
        }
      }
    </nav>

    <button class="collapse-btn" type="button" (click)="toggleSidebar()">
      <i class="pi" [class.pi-angle-double-left]="!collapsed()" [class.pi-angle-double-right]="collapsed()"></i>
      @if (!collapsed()) {
        <span>Collapse</span>
      }
    </button>
  </aside>

  <!-- ======================= MAIN ======================= -->
  <div class="main">
    <p-toolbar styleClass="border-noround border-none">
      <ng-template #end>
        <div class="flex align-items-center gap-2">
          <p-button label="Import Loans" icon="pi pi-cloud-upload" severity="secondary" [outlined]="true" size="small" />
          <p-button label="Export" icon="pi pi-upload" severity="secondary" [outlined]="true" size="small" />

          <div class="border-left-1 surface-border mx-1" style="height: 24px"></div>

          <p-button
            [icon]="bridge.theme() === 'light' ? 'pi pi-moon' : 'pi pi-sun'"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            [ariaLabel]="bridge.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
            (onClick)="bridge.toggleTheme()"
          />
          <p-overlaybadge value="4" severity="danger" badgeSize="small">
            <p-button icon="pi pi-bell" [text]="true" [rounded]="true" severity="secondary" ariaLabel="Notifications" />
          </p-overlaybadge>
          <p-button icon="pi pi-question-circle" [text]="true" [rounded]="true" severity="secondary" ariaLabel="Help" />

          @if (bridge.user(); as user) {
            <div class="flex align-items-center gap-2 pl-2 cursor-pointer">
              <p-avatar [label]="user.initials" shape="circle" />
              <span class="font-medium">{{ user.displayName }}</span>
              <i class="pi pi-angle-down text-xs text-color-secondary"></i>
            </div>
          }
        </div>
      </ng-template>
    </p-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
